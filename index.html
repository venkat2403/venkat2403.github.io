<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>🔔 PreBell — 2026-04-03</title>
<style>
:root {
  --bg:        #0a0d12;
  --surface:   #111520;
  --surface-2: #161b28;
  --border:    #1e2535;
  --text:      #eef2f7;
  --text-2:    #9aaabb;
  --muted:     #5c6e82;
  --green:     #30d158;
  --green-bg:  #0a1f12;
  --yellow:    #ffd60a;
  --yellow-bg: #1a1400;
  --red:       #ff453a;
  --red-bg:    #1a0808;
  --blue:      #0a84ff;
  --orange:    #ff9f0a;
  --purple:    #bf5af2;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', ui-monospace, 'Cascadia Code', Consolas, monospace;
  --radius: 12px;
  --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  padding: 0 20px 100px;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── top banner ── */
.top-bar {
  background: rgba(17, 21, 32, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar .brand { display: flex; flex-direction: column; gap: 2px; }
.top-bar h1 { font-size: 22px; color: var(--blue); font-weight: 700; letter-spacing: -0.5px; }
.top-bar .tagline { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
.top-bar .ts { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.7; }

/* ── market condition badge ── */
.mkt-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(48,209,88,.25);  }
.mkt-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(255,214,10,.25); }
.mkt-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(255,69,58,.25);  }
.mkt-badge  { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }

/* ── trading mode banner ── */
.trading-mode-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-radius: 10px; margin: 12px 0 8px;
  font-weight: 700; font-size: 15px; letter-spacing: 0.2px;
}
.trading-mode-banner.mode-green  { background: rgba(48,209,88,.10);  color: var(--green);  border: 1px solid rgba(48,209,88,.30);  }
.trading-mode-banner.mode-yellow { background: rgba(255,214,10,.10); color: var(--yellow); border: 1px solid rgba(255,214,10,.30); }
.trading-mode-banner.mode-red    { background: rgba(255,69,58,.10);  color: var(--red);    border: 1px solid rgba(255,69,58,.30);  }
.trading-mode-banner .mode-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
.traction-line { font-size: 12px; color: var(--text-2); margin: 0 0 10px 0; padding: 0 2px; }

/* ── sections ── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 14px auto;
  max-width: 960px;
  overflow: hidden;
}
.section-header {
  background: var(--surface-2);
  padding: 13px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}
.section-header h2 { font-size: 15px; color: var(--text); font-weight: 600; letter-spacing: -0.2px; }
.section-header .arrow { color: var(--muted); font-size: 12px; transition: transform .25s ease; }
.section-header.open .arrow { transform: rotate(180deg); }
.section-body { padding: 18px 20px; display: none; }
.section-body.open { display: block; }

/* ── KV grid ── */
.kv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0 24px;
}
.kv-row { display: flex; gap: 8px; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); }
.kv-row:last-child { border-bottom: none; }
.kv-label { color: var(--muted); min-width: 150px; flex-shrink: 0; font-size: 12px; font-weight: 500; }
.kv-value { color: var(--text-2); word-break: break-word; font-size: 13px; }
.kv-mono  { font-family: var(--font-mono); font-size: 12px; }

/* ── summary table ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--surface-2);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
td:first-child { color: var(--muted); font-size: 12px; font-weight: 500; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface-2); transition: background .15s; }

/* ── conviction ── */
.conv-high { color: var(--green);  }
.conv-mid  { color: var(--yellow); }
.conv-low  { color: var(--red);    }
.conv-cell { font-weight: 700; font-size: 15px; }
.conv-label { font-size: 10px; color: var(--muted); }

/* ── gap colours ── */
.gap-hot  { color: var(--orange); font-weight: 700; }
.gap-warm { color: var(--yellow); font-weight: 600; }
.gap-cool { color: var(--blue);   font-weight: 600; }

/* ── stock cards ── */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 10px auto;
  max-width: 960px;
  overflow: hidden;
}
.stock-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.ticker-badge {
  font-size: 22px;
  font-weight: 700;
  color: var(--blue);
  min-width: 90px;
  letter-spacing: -0.5px;
}
.stock-meta { flex: 1; line-height: 1.6; min-width: 0; }
.stock-meta > strong { color: var(--text); display: block; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 3px; }
.stock-meta .meta-row { font-size: 12px; color: var(--text-2); }
.stock-meta .meta-row strong { display: inline; font-size: 12px; font-weight: 600; }
.conv-ring {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 2.5px solid;
  font-size: 20px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -1px;
}
.card-body { padding: 20px; display: none; }
.card-body.open { display: block; }

/* ── subsections inside card ── */
.sub-section { margin-bottom: 24px; }
.sub-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 12px;
}
pre.raw-text {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-2);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.75;
  max-height: 320px;
  overflow-y: auto;
}

/* ── trade plan box ── */
.trade-plan {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.tp-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
}
.tp-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; font-weight: 600; }
.tp-val   { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.tp-val.green { color: var(--green); }
.tp-val.red   { color: var(--red);   }
.tp-val.blue  { color: var(--blue);  }

/* ── earnings scorecard ── */
.score-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.score-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.score-label { font-size: 10px; color: var(--muted); letter-spacing: .5px; font-weight: 600; text-transform: uppercase; }
.score-val   { font-size: 20px; font-weight: 700; color: var(--text); margin: 6px 0 4px; letter-spacing: -0.5px; }
.score-bar   { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; }

/* ── sector ETF grid ── */
.etf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.etf-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.etf-ticker  { font-size: 14px; font-weight: 700; color: var(--blue); letter-spacing: -0.3px; }
.etf-name    { font-size: 10px; color: var(--muted); margin: 3px 0 2px; font-weight: 500; }
.etf-change  { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
.etf-status  { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .3px; font-weight: 600; text-transform: uppercase; }
.etf-hot     { border-color: rgba(48,209,88,.35); background: var(--green-bg); }
.etf-cold    { border-color: rgba(255,69,58,.35);  background: var(--red-bg);  }
.etf-up      { color: var(--green); }
.etf-flat    { color: var(--muted); }
.etf-down    { color: var(--red);   }
.etf-section-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin: 14px 0 7px;
  font-weight: 600;
}

/* ── source badges — pill style ── */
.badge-ah       { background: rgba(94,158,255,.1);  color: #7ec8e3; border: 1px solid rgba(94,158,255,.25);
                  font-size: 10px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
.badge-earnings { background: rgba(48,209,88,.1);   color: var(--green); border: 1px solid rgba(48,209,88,.25);
                  font-size: 10px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
.badge-ep       { background: rgba(255,214,10,.1);  color: #ffd60a; border: 1px solid rgba(255,214,10,.35);
                  font-size: 10px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; font-weight: 700; }

/* ── no-stocks banner ── */
.no-stocks {
  text-align: center;
  padding: 64px 20px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.7;
}
.no-stocks span { display: block; font-size: 48px; margin-bottom: 16px; }

/* ── footer ── */
footer {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  padding: 24px 20px;
  border-top: 1px solid var(--border);
  max-width: 960px;
  margin: 40px auto 0;
  line-height: 1.8;
}

/* ── market quick card ── */
.mkt-quick { padding: 14px 20px 10px; }
.mkt-verdict-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
.mkt-score-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 180px; }
.mkt-score-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.mkt-score-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.mkt-score-num { font-size: 14px; color: var(--text); font-weight: 700; white-space: nowrap; letter-spacing: -0.3px; }
.mkt-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 4px; }
.mkt-metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; text-align: center; }
.mkt-metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; font-weight: 600; margin-bottom: 5px; }
.mkt-metric-value { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
.mkt-metric-note { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .2px; }
.mkt-risk { background: rgba(255,159,10,.08); border: 1px solid rgba(255,159,10,.2); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--orange); margin-bottom: 10px; }
.mkt-calendar { font-size: 12px; color: var(--muted); line-height: 1.7; }
.mkt-details-toggle { font-size: 12px; color: var(--blue); cursor: pointer; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 12px; display: block; }
.mkt-details-content { display: none; margin-top: 10px; }
.mkt-details-content.open { display: block; }

/* ── conviction tier section labels ── */
.tier-label { font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; padding: 18px 0 6px; max-width: 960px; margin: 0 auto; }
.tier-tradeable { color: var(--green); }
.tier-watchlist  { color: var(--yellow); }

/* ── no-tradeable banner ── */
.no-tradeable { background: rgba(255,69,58,.06); border: 1px solid rgba(255,69,58,.2); border-radius: var(--radius); max-width: 960px; margin: 14px auto; padding: 36px 28px; text-align: center; }
.no-tradeable .nt-icon  { font-size: 40px; display: block; margin-bottom: 12px; }
.no-tradeable .nt-title { font-size: 20px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
.no-tradeable .nt-body  { font-size: 14px; color: var(--muted); line-height: 1.8; }

/* ── EP alert banner ── */
.ep-banner { background: rgba(255,214,10,.07); border: 2px solid #ffd60a; border-radius: var(--radius); max-width: 960px; margin: 14px auto; padding: 18px 22px; }
.ep-banner-title { font-size: 15px; font-weight: 800; color: #ffd60a; letter-spacing: .4px; margin-bottom: 4px; }
.ep-banner-sub { font-size: 11px; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .6px; }
.ep-row { display: flex; flex-wrap: wrap; gap: 10px; }
.ep-card { background: rgba(255,214,10,.06); border: 1px solid rgba(255,214,10,.35); border-radius: 8px; padding: 10px 14px; min-width: 180px; flex: 1 1 180px; }
.ep-card-ticker { font-size: 17px; font-weight: 800; color: #ffd60a; }
.ep-card-setup { font-size: 11px; color: var(--muted); margin: 2px 0 6px; text-transform: uppercase; letter-spacing: .5px; }
.ep-card-action { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 3px; }
.ep-card-detail { font-size: 11px; color: var(--text-2); line-height: 1.6; }

/* ── EP stock card gold border ── */
.stock-card.ep-stock { border-left: 3px solid #ffd60a; }

/* ── responsive — tablet ── */
@media (max-width: 768px) {
  .section, .stock-card { margin: 10px auto; }
  .kv-grid { grid-template-columns: 1fr; }
  .trade-plan { grid-template-columns: repeat(3, 1fr); }
  .etf-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); }
  .mkt-metrics { grid-template-columns: repeat(2, 1fr); }
  th { font-size: 10px; padding: 8px 10px; }
  td { padding: 9px 10px; font-size: 12px; }
}

/* ── responsive — phone ── */
@media (max-width: 480px) {
  body { padding: 0 8px 60px; font-size: 13px; }
  .top-bar { flex-direction: column; align-items: flex-start; padding: 12px 14px; }
  .top-bar h1 { font-size: 20px; }
  .top-bar .ts { font-size: 11px; }
  .section-header h2 { font-size: 14px; }
  .section-body { padding: 12px 12px; }
  .kv-label { min-width: 110px; font-size: 11px; }
  .kv-value { font-size: 12px; }
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 700px; }
  th { font-size: 10px; padding: 7px 9px; }
  td { padding: 7px 9px; font-size: 11px; }
  .stock-header { flex-wrap: wrap; gap: 10px; padding: 12px 14px; min-height: 44px; }
  .ticker-badge { font-size: 18px; min-width: 64px; }
  .stock-meta strong { font-size: 14px; }
  .conv-ring    { width: 46px; height: 46px; font-size: 16px; border-width: 2px; }
  .card-body    { padding: 14px 12px; }
  .trade-plan { grid-template-columns: repeat(2, 1fr); }
  .tp-val     { font-size: 18px; }
  .etf-grid   { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 6px; }
  .etf-cell   { padding: 8px 6px; }
  .etf-ticker { font-size: 13px; }
  .etf-change { font-size: 15px; }
  .score-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  .badge-ah, .badge-earnings, .badge-ep { font-size: 9px; padding: 2px 7px; }
  .section-header, .stock-header { min-height: 44px; }
  .mkt-badge { font-size: 11px; padding: 3px 10px; }
  footer { font-size: 11px; padding: 16px 8px; }
}

/* ── 401k Action Bar (top of page) ── */
.ret-action-bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 10px 20px; margin: 0 0 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: 10px;
}
.ret-action-label {
  font-size: 11px; font-weight: 700; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .7px; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.ret-action-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 16px; border-radius: 20px; font-weight: 800;
  font-size: 14px; letter-spacing: .2px; white-space: nowrap;
  border: 2px solid transparent;
}
.ret-action-pill-green  { background: rgba(48,209,88,.15);  border-color: rgba(48,209,88,.5);  color: var(--green);  }
.ret-action-pill-yellow { background: rgba(255,214,10,.15); border-color: rgba(255,214,10,.5); color: var(--yellow); }
.ret-action-pill-orange { background: rgba(255,159,10,.15); border-color: rgba(255,159,10,.5); color: var(--orange); }
.ret-action-pill-red    { background: rgba(255,69,58,.15);  border-color: rgba(255,69,58,.5);  color: var(--red);    }
.ret-action-score {
  font-size: 12px; color: var(--muted); white-space: normal; flex-shrink: 1; min-width: 0;
}
.ret-action-score strong { color: var(--text-2); }
.ret-action-score-bar {
  flex: 1; min-width: 80px; max-width: 160px;
  height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden;
}
.ret-action-score-fill { height: 100%; border-radius: 3px; }
.ret-action-override {
  font-size: 11px; color: var(--red); font-weight: 700;
  background: rgba(255,69,58,.1); border: 1px solid rgba(255,69,58,.3);
  padding: 3px 10px; border-radius: 20px; white-space: nowrap;
}
.ret-action-link {
  margin-left: auto; font-size: 11px; color: var(--blue); white-space: nowrap;
  text-decoration: none; cursor: pointer;
}
@media (max-width: 640px) {
  .ret-action-bar { gap: 8px; padding: 8px 12px; }
  .ret-action-score-bar { display: none; }
  .ret-action-link { display: none; }
}

/* ── 401k Retirement Advisor ── */
.ret-header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(191,90,242,.12); border: 1px solid rgba(191,90,242,.3);
  border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700;
  color: var(--purple); letter-spacing: .4px;
}
.ret-rec-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  margin-bottom: 20px;
}
@media (max-width: 640px) { .ret-rec-row { grid-template-columns: 1fr 1fr; } }
.ret-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px 14px; text-align: center;
}
.ret-box-label {
  font-size: 10px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .7px; font-weight: 600; margin-bottom: 8px;
}
.ret-score-num {
  font-size: 38px; font-weight: 800; letter-spacing: -2px; line-height: 1;
}
.ret-score-bar {
  height: 6px; background: var(--border); border-radius: 3px;
